<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GROKIN ♡</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-100 to-cyan-100 flex flex-col items-center justify-center gap-8">

  <h1 class="text-5xl font-bold text-purple-600">GROKIN ♡</h1>

  <div id="mix-area" class="relative w-[360px] h-[360px] rounded-full overflow-hidden shadow-2xl cursor-pointer border-8 border-white">
    <video id="fusion-video" 
           class="absolute inset-0 w-full h-full object-cover"
           loop 
           muted 
           playsinline>
  <source src="https://drive.google.com/file/d/13y4WnrEFl08wbviw3LCPXPbpt8769DFW/view?usp=drivesdk" type="video/mp4">
</video>
    </video>

    <div id="overlay" class="absolute inset-0 flex items-center justify-center bg-black/40 opacity-0 transition-all">
      <p class="text-white text-2xl font-bold tracking-widest">溶け合ってる♡</p>
    </div>
  </div>

  <p class="text-purple-700 font-medium">長押しでぐるぐる融合...</p>
</body>

<script>
  const area = document.getElementById('mix-area');
  const video = document.getElementById('fusion-video');
  const overlay = document.getElementById('overlay');
  let pressTimer;

  function startPress() {
    pressTimer = setTimeout(() => {
      video.playbackRate = 0.5;
      video.play();
      overlay.classList.remove('opacity-0');
      overlay.classList.add('opacity-100');
    }, 300);
  }

  function endPress() {
    clearTimeout(pressTimer);
    video.pause();
    overlay.classList.add('opacity-0');
    overlay.classList.remove('opacity-100');
  }

  area.addEventListener('mousedown', startPress);
  area.addEventListener('mouseup', endPress);
  area.addEventListener('mouseleave', endPress);
  area.addEventListener('touchstart', (e)=>{e.preventDefault(); startPress();});
  area.addEventListener('touchend', (e)=>{e.preventDefault(); endPress();});
</script>
</html>
